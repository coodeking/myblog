<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11 2028考研公共课前半程规划</title>
    <style>
        :root {
            --bg: #f6f1e8;
            --paper: rgba(255,255,255,.94);
            --text: #211f1b;
            --muted: #6d665c;
            --line: rgba(34,31,27,.12);
            --accent: #71563a;
            --accent-soft: #f2e4d2;
            --math: #2f6f73;
            --english: #456fb4;
            --politics: #ad6c36;
            --shadow: 0 24px 60px -42px rgba(43,33,22,.45), 0 10px 28px -24px rgba(43,33,22,.36);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 12% 0%, rgba(128, 92, 54, .16), transparent 28%),
                radial-gradient(circle at 88% 12%, rgba(47, 111, 115, .14), transparent 24%),
                linear-gradient(180deg, #fbf8f1 0%, var(--bg) 100%);
            color: var(--text);
            font-family: "Noto Serif SC", "Microsoft YaHei", "PingFang SC", sans-serif;
            line-height: 1.78;
        }
        .container { width: min(1080px, calc(100% - 32px)); margin: 0 auto; padding: 30px 0 64px; }
        header {
            position: relative;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 28px;
            background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(250,245,236,.94));
            box-shadow: var(--shadow);
            padding: 34px;
            margin-bottom: 22px;
        }
        header::after {
            content: "";
            position: absolute;
            right: -74px;
            bottom: -108px;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(113,86,58,.18), transparent 68%);
        }
        h1 { max-width: 760px; font-size: clamp(2rem, 4vw, 3.3rem); line-height: 1.14; letter-spacing: -.04em; margin-bottom: 18px; }
        .meta { display: flex; flex-wrap: wrap; gap: 10px; color: var(--muted); position: relative; z-index: 1; }
        .meta span {
            display: inline-flex;
            border: 1px solid var(--line);
            background: rgba(255,255,255,.7);
            border-radius: 999px;
            padding: 7px 12px;
            font-size: .95rem;
        }
        .panel {
            border: 1px solid var(--line);
            border-radius: 24px;
            background: var(--paper);
            box-shadow: var(--shadow);
            padding: 26px;
            margin-bottom: 22px;
        }
        .panel h2 { font-size: 1.3rem; margin-bottom: 14px; letter-spacing: -.02em; }
        .strategy {
            border-radius: 18px;
            border: 1px solid rgba(113,86,58,.18);
            background: #fffaf2;
            padding: 16px 18px;
            color: #302b24;
            margin-bottom: 16px;
        }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        .course {
            border: 1px solid var(--line);
            border-radius: 20px;
            background: #fff;
            padding: 18px;
            text-align: left;
        }
        .course h3 { font-size: 1.05rem; margin-bottom: 10px; }
        .course.math { box-shadow: inset 4px 0 0 var(--math); }
        .course.english { box-shadow: inset 4px 0 0 var(--english); }
        .course.politics { box-shadow: inset 4px 0 0 var(--politics); }
        .course.math h3 { color: var(--math); }
        .course.english h3 { color: var(--english); }
        .course.politics h3 { color: var(--politics); }
        ul { padding-left: 20px; }
        li { margin-bottom: 9px; color: #403a32; }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin: 24px 0 16px;
            color: var(--muted);
            flex-wrap: wrap;
        }
        button {
            border: 0;
            border-radius: 999px;
            background: var(--text);
            color: white;
            padding: 11px 17px;
            cursor: pointer;
            font-weight: 700;
        }
        .weeks { display: grid; gap: 14px; }
        .week-card {
            border: 1px solid var(--line);
            border-radius: 22px;
            background: rgba(255,255,255,.9);
            overflow: hidden;
            box-shadow: 0 18px 38px -34px rgba(43,33,22,.5);
        }
        .week-card.open { border-color: rgba(113,86,58,.28); }
        .week-head {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
            gap: 16px;
            padding: 18px 20px;
            background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(250,245,236,.95));
            color: var(--text);
            border-radius: 0;
        }
        .week-head h3 { font-size: 1.05rem; line-height: 1.45; }
        .kicker {
            display: inline-flex;
            width: fit-content;
            margin-bottom: 6px;
            border-radius: 999px;
            padding: 4px 9px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: .78rem;
            font-weight: 800;
        }
        .date {
            flex: 0 0 auto;
            color: var(--muted);
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: .86rem;
            border-radius: 999px;
            padding: 7px 10px;
            background: rgba(0,0,0,.045);
        }
        .chev { font-size: 1.1rem; color: var(--accent); }
        .week-card.open .chev { transform: rotate(180deg); }
        .week-body { display: none; padding: 0 20px 20px; }
        .week-card.open .week-body { display: block; }
        .message {
            margin-bottom: 14px;
            border: 1px solid rgba(113,86,58,.18);
            border-radius: 18px;
            background: #fff7ec;
            color: #30271e;
            padding: 15px 17px;
        }
        .subjects { display: grid; gap: 12px; }
        .subject {
            border: 1px solid var(--line);
            border-radius: 18px;
            background: white;
            padding: 15px 16px;
        }
        .subject h4 { margin-bottom: 8px; font-size: 1rem; }
        .subject.math h4 { color: var(--math); }
        .subject.english h4 { color: var(--english); }
        .subject.politics h4 { color: var(--politics); }
        .subject p { white-space: pre-line; color: #464038; }
        footer { text-align: center; color: var(--muted); margin-top: 26px; font-size: .92rem; }
        @media (max-width: 860px) {
            .grid { grid-template-columns: 1fr; }
            header, .panel { padding: 22px; border-radius: 22px; }
            .week-head { align-items: flex-start; flex-direction: column; }
            .date { white-space: normal; }
        }
    </style>
</head>
<body>
    <main class="container">
        <header>
            <h1>11 的 2028 考研公共课前半程规划</h1>
            <div class="meta" id="meta-one"></div>
            <div class="meta" id="meta-two" style="margin-top: 8px;"></div>
        </header>

        <section class="panel">
            <h2>这份表怎么用</h2>
            <p class="strategy" id="intro"></p>
            <p class="strategy" id="strategy"></p>
            <div class="grid">
                <div class="course math">
                    <h3>数学一主线</h3>
                    <ul id="math-list"></ul>
                </div>
                <div class="course english">
                    <h3>英语一主线</h3>
                    <ul id="english-list"></ul>
                </div>
                <div class="course politics">
                    <h3>政治主线</h3>
                    <ul id="politics-list"></ul>
                </div>
            </div>
        </section>

        <div class="toolbar">
            <span>共 27 周，只排到 2026 年 12 月；2027 年部分先留空。</span>
            <button type="button" id="toggle-all">展开全部</button>
        </div>
        <section class="weeks" id="weeks"></section>
        <footer>本页只作为 2026 年 7-12 月公共课前半程安排，后续月份暂不展开。</footer>
    </main>

    <script>
        const planData = {

  "weeks": [
    {
      "week": 1,
      "date": "2026.07.01 - 2026.07.07",
      "title": "先把高数入口打开",
      "message": "这周不要急着囤课，也不要一上来就翻很多资料。你现在数学最需要的是把手感找回来，把《张宇基础30讲》高数册从函数、极限、连续这一块开始接上。英语从单词和阅读习惯开始，不用在第一周就追求速度。\n\n这一周实际执行时，把上午清醒时间尽量留给数学，英语放在数学之后做。每天不用排很多块，数学一块、单词一块、阅读一小块就够。最重要的是把书、错题本、真题伴侣这几个入口固定住，后面半年都沿着这几个入口走，不要今天换一本、明天又换一个老师。\n\n本周收尾检查：本周结束前做一次小检查：数学要能不看书说出函数、极限、连续这章现在学到哪几个小节，错题本里至少有 8 道真正订正过的题；英语要能打开真题伴侣看到 2001 年 Text 1 的生词和定位句；政治只确认后期材料名称，不新增任务。检查完如果发现某一天断了，也不要补到很晚，第二天接上就行。",
      "math": "《张宇基础30讲》高数册先看“函数、极限、连续”这一章，重点放在函数性质、常见初等函数、极限定义、无穷小比较、连续与间断点。讲义例题不要只看结论，先自己盖住答案写第一步，能写多少算多少。课后题先做基础题，错题单独记在一个本子里，标清楚是概念不会、公式不熟，还是计算断掉。《1000题》本周只碰对应章节的基础题，数量不用贪，做完要订正。\n\n具体拆法可以这样做：先把《张宇基础30讲》高数册“函数、极限、连续”里函数概念、复合函数、反函数、奇偶性、单调性这些小节读一遍，例题不要连续看，看到例题先停下来写 3-5 行。极限部分先只做数列极限和函数极限的基础计算，课后题挑基础题和常规计算题，证明味道重的先标记。配套《1000题》基础篇只做同章基础题，目标是 25-35 题左右，错题本写清题号、知识点和第一步为什么没想到。",
      "english": "《不背单词》建一个考研核心词计划，本周先背 300-350 个词，目标是把每天背词的节奏固定下来。阅读只做入门：用《真题伴侣》找英语一 2001 年阅读 Text 1，先不限时读一遍，第二遍只做三件事：圈生词、划主干、把题干问什么写在旁边。不精翻，也不买手译本，读懂大意和选项错因就够。\n\n英语本周的重点不是刷很多文章，而是把单词和阅读流程搭起来。《不背单词》每天新词 45 个左右，复习词按 App 安排走，晚上花 10 分钟把当天总是点错的词再看一遍。2001 年 Text 1 做完后，不要整篇翻译，只把题干中的定位词、原文定位句和正确选项的同义替换写出来；如果有 10 个以上生词，只挑影响理解的词放进真题伴侣，不要把每个陌生词都抄进本子。",
      "politics": "政治这半年不安排正式任务。现在离 2027 年 10 月正式进场还早，本周只要知道政治后面会用腿姐冲刺背诵手册、苍盾小程序、澄箫宇政治一页纸和肖四，不需要开始看课。\n\n政治这周只保留一个位置感：它是公共课，但不是 2026 年 7 月要消耗时间的科目。可以在总清单里写一句“2027 年 10 月再买腿姐冲刺背诵手册、用苍盾刷选择题、看澄箫宇政治一页纸”，写完就停。现在如果提前看政治视频，后面大概率还要重来，不如把这点时间给极限计算。"
    },
    {
      "week": 2,
      "date": "2026.07.08 - 2026.07.14",
      "title": "极限和连续要算到纸上",
      "message": "这一周容易出现的问题是看例题觉得会，自己一算就卡。卡住很正常，先把计算过程写完整，想两分钟还没思路就看答案第一步，再关上书把这一题重写一遍。\n\n这周开始会有第一批错题，不要把错题当成进度失败。你现在刚起步，错题越早暴露越好。只要能把错误写清楚，哪怕本周少做几道新题，也比看完一堆答案但下次还不会要好。\n\n本周收尾检查：本周收尾时，把极限题分成三类：会直接算、需要等价替换或洛必达、需要先判断左右极限。每类挑 2 道题不看答案重写，写不出来就说明还没吃透。英语把 2001 年 Text 2 的四道题错因写成短句，别写很长。政治继续只保留后期入口，不为了凑进度打开课程。",
      "math": "继续推进《张宇基础30讲》高数册“函数、极限、连续”，把等价无穷小、洛必达法则、夹逼、单调有界、重要极限和间断点分类放在一起练。课后题按小节做，遇到证明味道很重的题先放过去，计算题和选择填空要写过程。《1000题》对应基础题至少做一轮，错题旁边写一句错因，比如“等价替换条件没看清”“左右极限漏了”。不会的知识点直接去 B 站搜关键词，不要从头听一长段课。\n\n《张宇基础30讲》高数册继续“函数、极限、连续”，这周把等价无穷小、两个重要极限、洛必达法则、夹逼准则、单调有界、左右极限和间断点类型分开练。建议先用讲义例题确认方法，再做课后题，最后做《1000题》基础篇对应题。题量控制在 35-45 题，不追多。每道极限错题都要补一句“这一步能不能这样换”，尤其是等价替换只在乘除结构里用，左右极限题要把左右两边都写出来。",
      "english": "单词继续按每天 45-55 个新词推进，加上 App 里的复习词，第一轮不要追求每个词都背到很熟，先把核心词面扫过去。阅读用 2001 年 Text 2，做完后不要大段翻译，只把每个选项为什么错写一句话。阅读里的生词放进《真题伴侣》反复看，优先记它在真题里的意思。\n\n单词继续第一轮，累计到 650-750 个左右就可以，不用为了数字把复习词跳掉。2001 年 Text 2 做完以后，把四道题按题型标一下：细节题、主旨题、推断题、态度题。每道错题只写一句错因，比如“定位到了上一句”“把例子当观点”“选项范围变大”。这样复盘会比精翻整篇更省时间，也更适合你现在阅读刚开始的状态。",
      "politics": "政治保持留空。这周如果手痒想看政治，就把时间收回来给数学极限题，政治不是现在的得分点。\n\n政治本周仍然不学。你可以顺手建一个文件夹叫“政治后期材料”，但里面现在不要塞课表、带背和截图。后面真正开始时，只留腿姐冲刺背诵手册、苍盾小程序、澄箫宇政治一页纸、肖四这条线，材料越少越好执行。"
    },
    {
      "week": 3,
      "date": "2026.07.15 - 2026.07.21",
      "title": "导数先练计算，再谈题型",
      "message": "本周开始导数，计算量会变多。你线代底子相对好，高数一般，所以前半程别急着换到线代找安全感，高数这一关先老老实实过。\n\n导数这一周要开始重视书写习惯。很多题不是想不到，而是中间链式法则漏了一层，或者符号抄错。你平时能完成大部分任务，所以这周给自己一个要求：每道导数题都写完整过程，不用脑子里省步骤。\n\n本周收尾检查：本周最后一天不要继续赶新题，专门抽一段时间查导数计算过程。复合函数、隐函数、参数方程各挑 2 道题重写，看看有没有漏层、漏符号。英语把 2001 年 Text 3 的定位句重新看一遍，确认每道题不是凭感觉选的。政治不做任何背诵，避免把刚建立的数学节奏打散。",
      "math": "《张宇基础30讲》高数册进入“一元函数微分学的概念与计算”。重点是导数定义、可导与连续关系、复合函数求导、隐函数求导、参数方程求导、高阶导数和微分。每个公式都要配两三道题写出来，不要只在书上看。《1000题》做对应基础题，导数计算题要把中间步骤写清楚，错题按“公式用错、链式法则漏项、隐函数符号错”分类。\n\n《张宇基础30讲》高数册“一元函数微分学的概念与计算”按导数定义、可导与连续、四则运算、复合函数、隐函数、参数方程、高阶导数来推进。课后题先做求导基础题，再做少量用定义判断可导的题。《1000题》基础篇对应题建议 30-40 题。错题本不要只写“算错”，要写清是复合函数层数漏了、隐函数左右两边求导没同步，还是高阶导数规律没看出来。遇到不会的题，先搜“隐函数求导”“参数方程求导”这类关键词看短讲解。",
      "english": "单词第一轮继续，本周累计新词尽量到 1000 个左右。阅读做 2001 年 Text 3，读的时候先找题干定位词，再回原文找同义替换。你担心阅读，先别把问题归结成英语差，多数时候是题干和选项没有回到原文。每篇阅读结束后整理 8-12 个真题生词。\n\n单词第一轮继续推进到 1000 个上下。2001 年 Text 3 做完后，重点看题干和原文是不是同义改写，不要只盯着生词。每篇文章挑 2 个长句拆主干即可，拆句时只找主语、谓语、宾语、从句引导词，不要把语法名词写一大堆。阅读里反复出现的动词和形容词优先放进真题伴侣，因为这些词经常决定作者态度。",

    },

        const subjectDefs = [
            ["math", "数学一", "math"],
            ["english", "英语一", "english"],
            ["politics", "政治", "politics"]
        ];

        function addPill(parent, text) {
            const span = document.createElement("span");
            span.textContent = text;
            parent.appendChild(span);
        }

        function fillList(id, items) {
            const ul = document.getElementById(id);
            items.forEach((item) => {
                const li = document.createElement("li");
                li.textContent = item;
                ul.appendChild(li);
            });
        }

        addPill(document.getElementById("meta-one"), `目标：${planData.student.target}`);
        addPill(document.getElementById("meta-one"), `年份：${planData.student.exam_year} 考研`);
        addPill(document.getElementById("meta-two"), `本页时间：${planData.student.period}`);
        addPill(document.getElementById("meta-two"), `科目：${planData.student.subjects}`);
        addPill(document.getElementById("meta-two"), `可用时间：${planData.student.hours}`);
        document.getElementById("intro").textContent = planData.overview.intro;
        document.getElementById("strategy").textContent = planData.overview.strategy;
        fillList("math-list", planData.overview.math);
        fillList("english-list", planData.overview.english);
        fillList("politics-list", planData.overview.politics);

        const weeksEl = document.getElementById("weeks");
        planData.weeks.forEach((week, index) => {
            const card = document.createElement("article");
            card.className = `week-card${index < 2 ? " open" : ""}`;

            const head = document.createElement("button");
            head.type = "button";
            head.className = "week-head";
            head.setAttribute("aria-expanded", index < 2 ? "true" : "false");

            const titleWrap = document.createElement("div");
            const kicker = document.createElement("span");
            kicker.className = "kicker";
            kicker.textContent = `WEEK ${String(week.week).padStart(2, "0")}`;
            const h3 = document.createElement("h3");
            h3.textContent = week.title;
            titleWrap.appendChild(kicker);
            titleWrap.appendChild(h3);

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = week.date;
            const chev = document.createElement("span");
            chev.className = "chev";
            chev.textContent = "⌄";

            head.appendChild(titleWrap);
            head.appendChild(date);
            head.appendChild(chev);
            card.appendChild(head);

            const body = document.createElement("div");
            body.className = "week-body";
            const message = document.createElement("p");
            message.className = "message";
            message.textContent = week.message;
            body.appendChild(message);

            const subjects = document.createElement("div");
            subjects.className = "subjects";
            subjectDefs.forEach(([key, label, klass]) => {
                const subject = document.createElement("section");
                subject.className = `subject ${klass}`;
                const h4 = document.createElement("h4");
                h4.textContent = label;
                const p = document.createElement("p");
                p.textContent = week[key];
                subject.appendChild(h4);
                subject.appendChild(p);
                subjects.appendChild(subject);
            });
            body.appendChild(subjects);
            card.appendChild(body);

            head.addEventListener("click", () => {
                const isOpen = card.classList.toggle("open");
                head.setAttribute("aria-expanded", isOpen ? "true" : "false");
            });
            weeksEl.appendChild(card);
        });

        document.getElementById("toggle-all").addEventListener("click", (event) => {
            const cards = [...document.querySelectorAll(".week-card")];
            const shouldOpen = cards.some((card) => !card.classList.contains("open"));
            cards.forEach((card) => {
                card.classList.toggle("open", shouldOpen);
                const head = card.querySelector(".week-head");
                head.setAttribute("aria-expanded", shouldOpen ? "true" : "false");
            });
            event.currentTarget.textContent = shouldOpen ? "收起全部" : "展开全部";
        });
    </script>
</body>
