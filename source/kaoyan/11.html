<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11 2028考研公共课前半程规划</title>
    <style>
        :root {
            --bg: #f6f1e8;
            --paper: rgba(255,255,255,.94);
            --text: #211f1b;
            --muted: #6d665c;
            --line: rgba(34,31,27,.12);
            --accent: #71563a;
            --accent-soft: #f2e4d2;
            --math: #2f6f73;
            --english: #456fb4;
            --politics: #ad6c36;
            --shadow: 0 24px 60px -42px rgba(43,33,22,.45), 0 10px 28px -24px rgba(43,33,22,.36);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 12% 0%, rgba(128, 92, 54, .16), transparent 28%),
                radial-gradient(circle at 88% 12%, rgba(47, 111, 115, .14), transparent 24%),
                linear-gradient(180deg, #fbf8f1 0%, var(--bg) 100%);
            color: var(--text);
            font-family: "Noto Serif SC", "Microsoft YaHei", "PingFang SC", sans-serif;
            line-height: 1.78;
        }
        .container { width: min(1080px, calc(100% - 32px)); margin: 0 auto; padding: 30px 0 64px; }
        header {
            position: relative;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 28px;
            background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(250,245,236,.94));
            box-shadow: var(--shadow);
            padding: 34px;
            margin-bottom: 22px;
        }
        header::after {
            content: "";
            position: absolute;
            right: -74px;
            bottom: -108px;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(113,86,58,.18), transparent 68%);
        }
        h1 { max-width: 760px; font-size: clamp(2rem, 4vw, 3.3rem); line-height: 1.14; letter-spacing: -.04em; margin-bottom: 18px; }
        .meta { display: flex; flex-wrap: wrap; gap: 10px; color: var(--muted); position: relative; z-index: 1; }
        .meta span {
            display: inline-flex;
            border: 1px solid var(--line);
            background: rgba(255,255,255,.7);
            border-radius: 999px;
            padding: 7px 12px;
            font-size: .95rem;
        }
        .panel {
            border: 1px solid var(--line);
            border-radius: 24px;
            background: var(--paper);
            box-shadow: var(--shadow);
            padding: 26px;
            margin-bottom: 22px;
        }
        .panel h2 { font-size: 1.3rem; margin-bottom: 14px; letter-spacing: -.02em; }
        .strategy {
            border-radius: 18px;
            border: 1px solid rgba(113,86,58,.18);
            background: #fffaf2;
            padding: 16px 18px;
            color: #302b24;
            margin-bottom: 16px;
        }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        .course {
            border: 1px solid var(--line);
            border-radius: 20px;
            background: #fff;
            padding: 18px;
            text-align: left;
        }
        .course h3 { font-size: 1.05rem; margin-bottom: 10px; }
        .course.math { box-shadow: inset 4px 0 0 var(--math); }
        .course.english { box-shadow: inset 4px 0 0 var(--english); }
        .course.politics { box-shadow: inset 4px 0 0 var(--politics); }
        .course.math h3 { color: var(--math); }
        .course.english h3 { color: var(--english); }
        .course.politics h3 { color: var(--politics); }
        ul { padding-left: 20px; }
        li { margin-bottom: 9px; color: #403a32; }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin: 24px 0 16px;
            color: var(--muted);
            flex-wrap: wrap;
        }
        button {
            border: 0;
            border-radius: 999px;
            background: var(--text);
            color: white;
            padding: 11px 17px;
            cursor: pointer;
            font-weight: 700;
        }
        .weeks { display: grid; gap: 14px; }
        .week-card {
            border: 1px solid var(--line);
            border-radius: 22px;
            background: rgba(255,255,255,.9);
            overflow: hidden;
            box-shadow: 0 18px 38px -34px rgba(43,33,22,.5);
        }
        .week-card.open { border-color: rgba(113,86,58,.28); }
        .week-head {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
            gap: 16px;
            padding: 18px 20px;
            background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(250,245,236,.95));
            color: var(--text);
            border-radius: 0;
        }
        .week-head h3 { font-size: 1.05rem; line-height: 1.45; }
        .kicker {
            display: inline-flex;
            width: fit-content;
            margin-bottom: 6px;
            border-radius: 999px;
            padding: 4px 9px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: .78rem;
            font-weight: 800;
        }
        .date {
            flex: 0 0 auto;
            color: var(--muted);
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: .86rem;
            border-radius: 999px;
            padding: 7px 10px;
            background: rgba(0,0,0,.045);
        }
        .chev { font-size: 1.1rem; color: var(--accent); }
        .week-card.open .chev { transform: rotate(180deg); }
        .week-body { display: none; padding: 0 20px 20px; }
        .week-card.open .week-body { display: block; }
        .message {
            margin-bottom: 14px;
            border: 1px solid rgba(113,86,58,.18);
            border-radius: 18px;
            background: #fff7ec;
            color: #30271e;
            padding: 15px 17px;
        }
        .subjects { display: grid; gap: 12px; }
        .subject {
            border: 1px solid var(--line);
            border-radius: 18px;
            background: white;
            padding: 15px 16px;
        }
        .subject h4 { margin-bottom: 8px; font-size: 1rem; }
        .subject.math h4 { color: var(--math); }
        .subject.english h4 { color: var(--english); }
        .subject.politics h4 { color: var(--politics); }
        .subject p { white-space: pre-line; color: #464038; }
        footer { text-align: center; color: var(--muted); margin-top: 26px; font-size: .92rem; }
        @media (max-width: 860px) {
            .grid { grid-template-columns: 1fr; }
            header, .panel { padding: 22px; border-radius: 22px; }
            .week-head { align-items: flex-start; flex-direction: column; }
            .date { white-space: normal; }
        }
    </style>
</head>
<body>
    <main class="container">
        <header>
            <h1>11 的 2028 考研公共课前半程规划</h1>
            <div class="meta" id="meta-one"></div>
            <div class="meta" id="meta-two" style="margin-top: 8px;"></div>
        </header>

        <section class="panel">

                </div>
                <div class="course politics">
                    <h3>政治主线</h3>
                    <ul id="politics-list"></ul>
                </div>
            </div>
        </section>

        <div class="toolbar">
            <span>共 27 周，只排到 2026 年 12 月；2027 年部分先留空。</span>
            <button type="button" id="toggle-all">展开全部</button>
        </div>
        <section class="weeks" id="weeks"></section>
        <footer>本页只作为 2026 年 7-12 月公共课前半程安排，后续月份暂不展开。</footer>
    </main>

        const subjectDefs = [
            ["math", "数学一", "math"],
            ["english", "英语一", "english"],
            ["politics", "政治", "politics"]
        ];

        function addPill(parent, text) {
            const span = document.createElement("span");
            span.textContent = text;
            parent.appendChild(span);
        }

        function fillList(id, items) {
            const ul = document.getElementById(id);
            items.forEach((item) => {
                const li = document.createElement("li");
                li.textContent = item;
                ul.appendChild(li);
            });
        }

        addPill(document.getElementById("meta-one"), `目标：${planData.student.target}`);
        addPill(document.getElementById("meta-one"), `年份：${planData.student.exam_year} 考研`);
        addPill(document.getElementById("meta-two"), `本页时间：${planData.student.period}`);
        addPill(document.getElementById("meta-two"), `科目：${planData.student.subjects}`);
        addPill(document.getElementById("meta-two"), `可用时间：${planData.student.hours}`);
        document.getElementById("intro").textContent = planData.overview.intro;
        document.getElementById("strategy").textContent = planData.overview.strategy;
        fillList("math-list", planData.overview.math);
        fillList("english-list", planData.overview.english);
        fillList("politics-list", planData.overview.politics);

        const weeksEl = document.getElementById("weeks");
        planData.weeks.forEach((week, index) => {
            const card = document.createElement("article");
            card.className = `week-card${index < 2 ? " open" : ""}`;

            const head = document.createElement("button");
            head.type = "button";
            head.className = "week-head";
            head.setAttribute("aria-expanded", index < 2 ? "true" : "false");

            const titleWrap = document.createElement("div");
            const kicker = document.createElement("span");
            kicker.className = "kicker";
            kicker.textContent = `WEEK ${String(week.week).padStart(2, "0")}`;
            const h3 = document.createElement("h3");
            h3.textContent = week.title;
            titleWrap.appendChild(kicker);
            titleWrap.appendChild(h3);

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = week.date;
            const chev = document.createElement("span");
            chev.className = "chev";
            chev.textContent = "⌄";

            head.appendChild(titleWrap);
            head.appendChild(date);
            head.appendChild(chev);
            card.appendChild(head);

            const body = document.createElement("div");
            body.className = "week-body";
            const message = document.createElement("p");
            message.className = "message";
            message.textContent = week.message;
            body.appendChild(message);

            const subjects = document.createElement("div");
            subjects.className = "subjects";
            subjectDefs.forEach(([key, label, klass]) => {
                const subject = document.createElement("section");
                subject.className = `subject ${klass}`;
                const h4 = document.createElement("h4");
                h4.textContent = label;
                const p = document.createElement("p");
                p.textContent = week[key];
                subject.appendChild(h4);
                subject.appendChild(p);
                subjects.appendChild(subject);
            });
            body.appendChild(subjects);
            card.appendChild(body);

            head.addEventListener("click", () => {
                const isOpen = card.classList.toggle("open");
                head.setAttribute("aria-expanded", isOpen ? "true" : "false");
            });
            weeksEl.appendChild(card);
        });

        document.getElementById("toggle-all").addEventListener("click", (event) => {
            const cards = [...document.querySelectorAll(".week-card")];
            const shouldOpen = cards.some((card) => !card.classList.contains("open"));
            cards.forEach((card) => {
                card.classList.toggle("open", shouldOpen);
                const head = card.querySelector(".week-head");
                head.setAttribute("aria-expanded", shouldOpen ? "true" : "false");
            });
            event.currentTarget.textContent = shouldOpen ? "收起全部" : "展开全部";
        });
    </script>
