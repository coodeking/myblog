<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考研规划信息收集 | WJ的AI技术博客</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 30px 0;
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header p { color: #aaa; font-size: 14px; }
        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
        }
        .progress-bar::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255,255,255,0.2);
            z-index: 0;
        }
        .step-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            z-index: 1;
            transition: all 0.3s;
        }
        .step-dot.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }
        .step-dot.done { background: #10b981; }
        .form-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            display: none;
        }
        .form-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title span { font-size: 24px; }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ccc;
        }
        .form-group label .required { color: #f5576c; margin-left: 4px; }
        input[type="text"], input[type="number"], input[type="date"], textarea, select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 15px;
            transition: all 0.2s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        textarea { min-height: 80px; resize: vertical; }
        select option { background: #1a1a2e; color: #fff; }
        .radio-group, .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .radio-item, .checkbox-item {
            padding: 10px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .radio-item:hover, .checkbox-item:hover { border-color: #667eea; }
        .radio-item.selected, .checkbox-item.selected {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
        }
        .radio-item input, .checkbox-item input { display: none; }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-prev {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .btn-prev:hover { background: rgba(255,255,255,0.2); }
        .btn-next, .btn-submit {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }
        .btn-next:hover, .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .tip {
            background: rgba(245, 158, 11, 0.1);
            border-left: 3px solid #f59e0b;
            padding: 12px;
            border-radius: 0 8px 8px 0;
            font-size: 13px;
            color: #fbbf24;
            margin-bottom: 20px;
        }
        .success-msg {
            text-align: center;
            padding: 60px 20px;
        }
        .success-msg h2 { font-size: 32px; margin-bottom: 16px; }
        .success-msg p { color: #aaa; }
        #loading {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 考研规划信息收集</h1>
            <p>请认真填写以下信息，越详细规划越精准（约10分钟）</p>
        </div>

        <div class="progress-bar">
            <div class="step-dot active" data-step="1">1</div>
            <div class="step-dot" data-step="2">2</div>
            <div class="step-dot" data-step="3">3</div>
            <div class="step-dot" data-step="4">4</div>
            <div class="step-dot" data-step="5">5</div>
            <div class="step-dot" data-step="6">6</div>
        </div>

        <form id="kaoyanForm">
            <!-- Step 1: 基本信息 -->
            <div class="form-section active" data-step="1">
                <h2 class="section-title"><span>👤</span> 基本信息与背景</h2>
                <div class="form-group">
                    <label>姓名/昵称<span class="required">*</span></label>
                    <input type="text" name="name" placeholder="用于规划称呼">
                </div>
                <div class="form-group">
                    <label>联系方式（微信优先）<span class="required">*</span></label>
                    <input type="text" name="contact" placeholder="微信号或手机号">
                </div>
                <div class="form-group">
                    <label>当前状态<span class="required">*</span></label>
                    <div class="radio-group" data-name="currentStatus">
                        <label class="radio-item"><input type="radio" name="currentStatus" value="大一">大一</label>
                        <label class="radio-item"><input type="radio" name="currentStatus" value="大二">大二</label>
                        <label class="radio-item"><input type="radio" name="currentStatus" value="大三">大三</label>
                        <label class="radio-item"><input type="radio" name="currentStatus" value="大四">大四</label>
                        <label class="radio-item"><input type="radio" name="currentStatus" value="已毕业">已毕业</label>
                        <label class="radio-item"><input type="radio" name="currentStatus" value="在职">在职</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>本科学校<span class="required">*</span></label>
                    <input type="text" name="undergraduate" placeholder="学校全称">
                </div>
                <div class="form-group">
                    <label>学校层次<span class="required">*</span></label>
                    <div class="radio-group" data-name="schoolLevel">
                        <label class="radio-item"><input type="radio" name="schoolLevel" value="985">985</label>
                        <label class="radio-item"><input type="radio" name="schoolLevel" value="211">211</label>
                        <label class="radio-item"><input type="radio" name="schoolLevel" value="一本">一本</label>
                        <label class="radio-item"><input type="radio" name="schoolLevel" value="二本">二本</label>
                        <label class="radio-item"><input type="radio" name="schoolLevel" value="三本/专升本">三本/专升本</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>本科专业<span class="required">*</span></label>
                    <input type="text" name="major" placeholder="专业名称">
                </div>
                <div class="form-group">
                    <label>是否有考研经历<span class="required">*</span></label>
                    <div class="radio-group" data-name="examExperience">
                        <label class="radio-item"><input type="radio" name="examExperience" value="一战">一战（首次）</label>
                        <label class="radio-item"><input type="radio" name="examExperience" value="二战">二战</label>
                        <label class="radio-item"><input type="radio" name="examExperience" value="三战及以上">三战及以上</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>往年考研经历简述（如有）</label>
                    <textarea name="prevExperience" placeholder="如目标院校、分数、失利原因分析等"></textarea>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-next" onclick="nextStep()">下一步 →</button>
                </div>
            </div>

            <!-- Step 2: 目标院校 -->
            <div class="form-section" data-step="2">
                <h2 class="section-title"><span>🎯</span> 目标院校与专业</h2>
                <div class="form-group">
                    <label>目标考试年份<span class="required">*</span></label>
                    <div class="radio-group" data-name="examYear">
                        <label class="radio-item"><input type="radio" name="examYear" value="2026">2026年</label>
                        <label class="radio-item"><input type="radio" name="examYear" value="2027">2027年</label>
                        <label class="radio-item"><input type="radio" name="examYear" value="2028">2028年</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>第一志愿院校<span class="required">*</span></label>
                    <input type="text" name="targetSchool" placeholder="目标学校全称">
                </div>
                <div class="form-group">
                    <label>第一志愿专业<span class="required">*</span></label>
                    <input type="text" name="targetMajor" placeholder="专业名称及代码（如有）">
                </div>
                <div class="form-group">
                    <label>学硕/专硕<span class="required">*</span></label>
                    <div class="radio-group" data-name="degreeType">
                        <label class="radio-item"><input type="radio" name="degreeType" value="学硕">学术型硕士</label>
                        <label class="radio-item"><input type="radio" name="degreeType" value="专硕">专业型硕士</label>
                        <label class="radio-item"><input type="radio" name="degreeType" value="未确定">未确定</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>备选院校（可选）</label>
                    <input type="text" name="backupSchools" placeholder="如有备选院校可填写">
                </div>
                <div class="form-group">
                    <label>是否跨考<span class="required">*</span></label>
                    <div class="radio-group" data-name="isCrossExam">
                        <label class="radio-item"><input type="radio" name="isCrossExam" value="否">否，本专业相关</label>
                        <label class="radio-item"><input type="radio" name="isCrossExam" value="是">是，跨专业</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>是否已了解目标院校历年分数线、报录比<span class="required">*</span></label>
                    <div class="radio-group" data-name="knowScoreLine">
                        <label class="radio-item"><input type="radio" name="knowScoreLine" value="已详细了解">已详细了解</label>
                        <label class="radio-item"><input type="radio" name="knowScoreLine" value="大概了解">大概了解</label>
                        <label class="radio-item"><input type="radio" name="knowScoreLine" value="还没了解">还没了解</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>目标总分（可选）</label>
                    <input type="number" name="targetScore" placeholder="如 380">
                </div>
                <div class="form-group">
                    <label>各科目标分（可选）</label>
                    <div style="display:flex;gap:10px;">
                        <input type="number" name="targetMath" placeholder="数学" style="flex:1;">
                        <input type="number" name="targetEnglish" placeholder="英语" style="flex:1;">
                        <input type="number" name="targetPolitics" placeholder="政治" style="flex:1;">
                    </div>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-prev" onclick="prevStep()">← 上一步</button>
                    <button type="button" class="btn btn-next" onclick="nextStep()">下一步 →</button>
                </div>
            </div>

            <!-- Step 3: 各科基础 -->
            <div class="form-section" data-step="3">
                <h2 class="section-title"><span>📚</span> 各科基础情况</h2>
                
                <div class="tip">💡 请如实评估，便于制定最适合你的规划</div>

                <h3 style="margin: 20px 0 16px; font-size: 16px; color: #f5576c;">📐 数学</h3>
                <div class="form-group">
                    <label>数学类型<span class="required">*</span></label>
                    <div class="radio-group" data-name="mathType">
                        <label class="radio-item"><input type="radio" name="mathType" value="数学一">数学一</label>
                        <label class="radio-item"><input type="radio" name="mathType" value="数学二">数学二</label>
                        <label class="radio-item"><input type="radio" name="mathType" value="数学三">数学三</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>数学整体基础<span class="required">*</span></label>
                    <div class="radio-group" data-name="mathLevel">
                        <label class="radio-item"><input type="radio" name="mathLevel" value="零基础">零基础</label>
                        <label class="radio-item"><input type="radio" name="mathLevel" value="薄弱">薄弱</label>
                        <label class="radio-item"><input type="radio" name="mathLevel" value="一般">一般</label>
                        <label class="radio-item"><input type="radio" name="mathLevel" value="较好">较好</label>
                        <label class="radio-item"><input type="radio" name="mathLevel" value="扎实">扎实</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>高数基础<span class="required">*</span></label>
                    <div class="radio-group" data-name="calculusLevel">
                        <label class="radio-item"><input type="radio" name="calculusLevel" value="零基础">零基础</label>
                        <label class="radio-item"><input type="radio" name="calculusLevel" value="薄弱">薄弱</label>
                        <label class="radio-item"><input type="radio" name="calculusLevel" value="一般">一般</label>
                        <label class="radio-item"><input type="radio" name="calculusLevel" value="较好">较好</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>线代基础<span class="required">*</span></label>
                    <div class="radio-group" data-name="linearLevel">
                        <label class="radio-item"><input type="radio" name="linearLevel" value="零基础">零基础</label>
                        <label class="radio-item"><input type="radio" name="linearLevel" value="薄弱">薄弱</label>
                        <label class="radio-item"><input type="radio" name="linearLevel" value="一般">一般</label>
                        <label class="radio-item"><input type="radio" name="linearLevel" value="较好">较好</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>概率论基础（数二可跳过）</label>
                    <div class="radio-group" data-name="probLevel">
                        <label class="radio-item"><input type="radio" name="probLevel" value="零基础">零基础</label>
                        <label class="radio-item"><input type="radio" name="probLevel" value="薄弱">薄弱</label>
                        <label class="radio-item"><input type="radio" name="probLevel" value="一般">一般</label>
                        <label class="radio-item"><input type="radio" name="probLevel" value="较好">较好</label>
                        <label class="radio-item"><input type="radio" name="probLevel" value="不考">不考</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>数学最薄弱部分<span class="required">*</span></label>
                    <div class="checkbox-group" data-name="mathWeakness">
                        <label class="checkbox-item"><input type="checkbox" name="mathWeakness" value="计算能力">计算能力</label>
                        <label class="checkbox-item"><input type="checkbox" name="mathWeakness" value="解题思路">解题思路</label>
                        <label class="checkbox-item"><input type="checkbox" name="mathWeakness" value="公式定理记忆">公式定理记忆</label>
                        <label class="checkbox-item"><input type="checkbox" name="mathWeakness" value="综合大题">综合大题</label>
                        <label class="checkbox-item"><input type="checkbox" name="mathWeakness" value="证明题">证明题</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>数学复习进度<span class="required">*</span></label>
                    <div class="radio-group" data-name="mathProgress">
                        <label class="radio-item"><input type="radio" name="mathProgress" value="未开始">未开始</label>
                        <label class="radio-item"><input type="radio" name="mathProgress" value="刚开始">刚开始</label>
                        <label class="radio-item"><input type="radio" name="mathProgress" value="基础进行中">基础进行中</label>
                        <label class="radio-item"><input type="radio" name="mathProgress" value="基础完成">基础完成</label>
                        <label class="radio-item"><input type="radio" name="mathProgress" value="强化中">强化中</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>已用数学教材/网课（可选）</label>
                    <input type="text" name="mathResources" placeholder="如张宇、汤家凤、李永乐等">
                </div>

                <h3 style="margin: 30px 0 16px; font-size: 16px; color: #667eea;">📖 英语</h3>
                <div class="form-group">
                    <label>英语类型<span class="required">*</span></label>
                    <div class="radio-group" data-name="englishType">
                        <label class="radio-item"><input type="radio" name="englishType" value="英语一">英语一</label>
                        <label class="radio-item"><input type="radio" name="englishType" value="英语二">英语二</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>四六级情况<span class="required">*</span></label>
                    <div class="radio-group" data-name="cetStatus">
                        <label class="radio-item"><input type="radio" name="cetStatus" value="四级未过">四级未过</label>
                        <label class="radio-item"><input type="radio" name="cetStatus" value="四级已过">四级已过</label>
                        <label class="radio-item"><input type="radio" name="cetStatus" value="六级已过">六级已过</label>
                        <label class="radio-item"><input type="radio" name="cetStatus" value="六级500+">六级500+</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>词汇量自评<span class="required">*</span></label>
                    <div class="radio-group" data-name="vocabLevel">
                        <label class="radio-item"><input type="radio" name="vocabLevel" value="<2000"><2000</label>
                        <label class="radio-item"><input type="radio" name="vocabLevel" value="2000-3500">2000-3500</label>
                        <label class="radio-item"><input type="radio" name="vocabLevel" value="3500-5000">3500-5000</label>
                        <label class="radio-item"><input type="radio" name="vocabLevel" value="5000+">5000+</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>阅读能力自评<span class="required">*</span></label>
                    <div class="radio-group" data-name="readingLevel">
                        <label class="radio-item"><input type="radio" name="readingLevel" value="长难句很困难">长难句很困难</label>
                        <label class="radio-item"><input type="radio" name="readingLevel" value="能读懂大意">能读懂大意</label>
                        <label class="radio-item"><input type="radio" name="readingLevel" value="基本通畅">基本通畅</label>
                        <label class="radio-item"><input type="radio" name="readingLevel" value="无障碍">无障碍</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>写作能力自评<span class="required">*</span></label>
                    <div class="radio-group" data-name="writingLevel">
                        <label class="radio-item"><input type="radio" name="writingLevel" value="无法成文">无法成文</label>
                        <label class="radio-item"><input type="radio" name="writingLevel" value="勉强凑字">勉强凑字</label>
                        <label class="radio-item"><input type="radio" name="writingLevel" value="结构尚可">结构尚可</label>
                        <label class="radio-item"><input type="radio" name="writingLevel" value="表达流畅">表达流畅</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>英语最担心题型<span class="required">*</span></label>
                    <div class="checkbox-group" data-name="englishWorry">
                        <label class="checkbox-item"><input type="checkbox" name="englishWorry" value="单词">单词记不住</label>
                        <label class="checkbox-item"><input type="checkbox" name="englishWorry" value="阅读">阅读</label>
                        <label class="checkbox-item"><input type="checkbox" name="englishWorry" value="完型">完型填空</label>
                        <label class="checkbox-item"><input type="checkbox" name="englishWorry" value="翻译">翻译</label>
                        <label class="checkbox-item"><input type="checkbox" name="englishWorry" value="作文">作文</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>英语复习进度<span class="required">*</span></label>
                    <div class="radio-group" data-name="englishProgress">
                        <label class="radio-item"><input type="radio" name="englishProgress" value="未开始">未开始</label>
                        <label class="radio-item"><input type="radio" name="englishProgress" value="背单词中">背单词中</label>
                        <label class="radio-item"><input type="radio" name="englishProgress" value="开始做真题">开始做真题</label>
                        <label class="radio-item"><input type="radio" name="englishProgress" value="强化中">强化中</label>
                    </div>
                </div>
                <div class="form-group">

    <script>
        let currentStep = 1;
        const totalSteps = 6;

        // Radio/Checkbox click handler
        document.querySelectorAll('.radio-item, .checkbox-item').forEach(item => {
            item.addEventListener('click', function(e) {
                const input = this.querySelector('input');
                if (input.type === 'radio') {
                    this.closest('.radio-group, .checkbox-group').querySelectorAll('.radio-item').forEach(i => i.classList.remove('selected'));
                    this.classList.add('selected');
                    input.checked = true;
                } else {
                    // Toggle checkbox
                    input.checked = !input.checked;
                    this.classList.toggle('selected', input.checked);
                }
            });
        });

        function updateProgress() {
            document.querySelectorAll('.step-dot').forEach((dot, index) => {
                dot.classList.remove('active', 'done');
                if (index + 1 < currentStep) dot.classList.add('done');
                if (index + 1 === currentStep) dot.classList.add('active');
            });
        }

        function showStep(step) {
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.querySelector(`.form-section[data-step="${step}"]`).classList.add('active');
            updateProgress();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function nextStep() {
            if (currentStep < totalSteps) {
                currentStep++;
                showStep(currentStep);
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                showStep(currentStep);
            }
        }

        // Form submit
        document.getElementById('kaoyanForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            document.getElementById('loading').style.display = 'flex';

            const formData = new FormData(this);
            const data = {};
            
            // Handle checkboxes
            const checkboxGroups = {};
            formData.forEach((value, key) => {
                if (this.querySelector(`input[name="${key}"][type="checkbox"]`)) {
                    if (!checkboxGroups[key]) checkboxGroups[key] = [];
                    checkboxGroups[key].push(value);
                } else {
                    data[key] = value;
                }
            });
            Object.assign(data, checkboxGroups);

            // TODO: Replace with your Supabase URL and anon key
            const SUPABASE_URL = 'https://ukquyolgcstifhltvxku.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrcXV5b2xnY3N0aWZobHR2eGt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg3MjkxMjQsImV4cCI6MjA4NDMwNTEyNH0.XQj8RupAYwRpxFkkLJUohx_MM3zfC1ZMLnc-vJ4jYFQ';

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/students`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        name: data.name || '未填写',
                        contact: data.contact || '未填写',
                        target_school: data.targetSchool || '未填写',
                        exam_year: parseInt(data.examYear) || 2027,
                        info_json: data,
                        status: '待处理'
                    })
                });

                if (response.ok) {
                    showStep('success');
                } else {
                    throw new Error('提交失败');
                }
            } catch (error) {
                console.error(error);
                alert('提交失败，请稍后重试或联系客服');
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        });
    </script>
